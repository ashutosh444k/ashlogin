<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg:       #0d0d0d;
    --bg-1:     #141414;
    --bg-2:     #1a1a1a;
    --bg-3:     #222222;
    --line:     #2a2a2a;
    --line-2:   #333333;
    --text:     #e8e8e6;
    --text-2:   #888884;
    --text-3:   #555552;
    --green:    #3dd68c;
    --green-dim:#1a3d2a;
    --amber:    #f5a623;
    --amber-dim:#3a2a0a;
    --blue:     #5b8dee;
    --blue-dim: #1a2540;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
}

/* ── NAVBAR ── */
.navbar {
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: .5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .35; }
}

.user-info {
    display: flex;
    align-items: center;
    gap: 16px;
}

.user-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
}

.logout-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    letter-spacing: .3px;
}

.logout-btn:hover {
    color: var(--text);
    border-color: var(--text-3);
}

/* ── CONTAINER ── */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 28px;
}

/* ── WELCOME ── */
.welcome-section {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.welcome-section h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.4px;
    margin-bottom: 4px;
}

.welcome-section p {
    font-size: 13px;
    color: var(--text-2);
}

.session-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    text-align: right;
    line-height: 1.6;
}

/* ── STATS ── */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-bottom: 32px;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
}

.stat-card {
    padding: 22px 24px;
    border-right: 1px solid var(--line);
    transition: background .2s;
}

.stat-card:last-child { border-right: none; }

.stat-card:hover { background: var(--bg-2); }

.stat-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
}

.stat-value {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
}

/* ── TWO COLUMNS ── */
.two-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
}

.card-header {
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-header h3 {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .8px;
}

.card-content { padding: 0; }

/* ── ACTIVITY ── */
.activity-item {
    display: flex;
    align-items: center;
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
    gap: 14px;
    transition: background .15s;
}

.activity-item:last-child { border-bottom: none; }
.activity-item:hover { background: var(--bg-2); }

.activity-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    width: 72px;
    flex-shrink: 0;
}

.activity-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
}

.activity-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: .3px;
    flex-shrink: 0;
}

.badge-coding  { background: var(--blue-dim);  color: var(--blue); }
.badge-feature { background: var(--green-dim); color: var(--green); }
.badge-debug   { background: var(--amber-dim); color: var(--amber); }

/* ── NOTIFICATIONS ── */
.notification {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    transition: background .15s;
}

.notification:last-child { border-bottom: none; }
.notification:hover { background: var(--bg-2); }

.notif-bar {
    width: 2px;
    height: 100%;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 16px;
}

.notification.success .notif-bar { background: var(--green); }
.notification.info    .notif-bar { background: var(--blue); }

.notification-message {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.55;
}

/* ── LOADING ── */
.loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
}

.spinner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--line-2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-3);
}

/* ── FADE IN ── */
.dashboard-anim {
    animation: fadeUp .35s ease both;
}

@keyframes fadeUp {
    from { opacity:0; transform: translateY(10px); }
    to   { opacity:1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-card  { border-bottom: 1px solid var(--line); }
    .stat-card:nth-child(even) { border-right: none; }
    .two-columns { grid-template-columns: 1fr; }
}

@media (max-width: 540px) {
    .container { padding: 20px 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .welcome-section { flex-direction: column; align-items: flex-start; gap: 8px; }
    .session-tag { text-align: left; }
    .navbar { padding: 0 16px; }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <div class="logo-dot"></div>
        workspace
    </div>
    <div class="user-info">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">logout</button>
    </div>
</nav>

<div class="container">
    <div id="dashboardContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>loading session...</p>
        </div>
    </div>
</div>

<script>
function getDate() {
    return new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

async function loadDashboard() {
    try {
        const response = await fetch('/api/dashboard');
        if (response.status === 401) { window.location.href = '/'; return; }
        const data = await response.json();
        renderDashboard(data);
    } catch(error) {
        console.error(error);
        document.getElementById('dashboardContent').innerHTML = `
            <div class="card" style="border-color:#3a1a1a">
                <div class="card-content" style="padding:24px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#e05252">
                    ERR — failed to load dashboard
                </div>
            </div>`;
    }
}

function renderDashboard(data) {
    const { user, stats, recent_activity, notifications } = data;
    document.getElementById('userName').textContent = user.fullname;

    document.getElementById('dashboardContent').innerHTML = `
        <div class="dashboard-anim">

            <div class="welcome-section">
                <div>
                    <h1>Good to see you, ${user.fullname}</h1>
                    <p>Here's what's been happening.</p>
                </div>
                <div class="session-tag">
                    <div>${getDate()}</div>
                    <div>${getTime()}</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Total visits</div>
                    <div class="stat-value">${stats.total_visits}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Projects</div>
                    <div class="stat-value">${stats.projects_completed}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Active days</div>
                    <div class="stat-value">${stats.internship_days}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Achievements</div>
                    <div class="stat-value">${stats.achievements}</div>
                </div>
            </div>

            <div class="two-columns">

                <div class="card">
                    <div class="card-header">
                        <h3>Recent activity</h3>
                    </div>
                    <div class="card-content">
                        ${recent_activity.map(a => `
                        <div class="activity-item">
                            <div class="activity-date">${a.date}</div>
                            <div class="activity-text">${a.activity}</div>
                            <div class="activity-badge badge-${a.type}">${a.type}</div>
                        </div>`).join('')}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Notifications</h3>
                    </div>
                    <div class="card-content">
                        ${notifications.map(n => `
                        <div class="notification ${n.type}">
                            <div class="notif-bar"></div>
                            <div class="notification-message">${n.message}</div>
                        </div>`).join('')}
                    </div>
                </div>

            </div>
        </div>`;
}

async function logout() {
    try {
        const res = await fetch('/logout', { method: 'POST' });
        if (res.ok) window.location.href = '/';
    } catch { alert('Logout failed'); }
}

loadDashboard();
</script>

</body>
</html>
