<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #1f2937;
}

.container {
    width: 100%;
    max-width: 380px;
    text-align: center;
}

/* Logo */
.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
}

.logo-icon {
    width: 34px;
    height: 34px;
    background: #4f46e5;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.logo-icon svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.logo-text {
    font-size: 18px;
    font-weight: 700;
    color: #1e1b4b;
    letter-spacing: 0.3px;
}

/* Card */
.card {
    border-radius: 20px;
    padding: 28px 28px 24px;
    text-align: left;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 8px 28px rgba(79, 70, 229, 0.09);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    font-size: 17px;
    color: #111827;
}

/* Inputs */
.input-group {
    margin-bottom: 14px;
}

.input-group label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: #6b7280;
    margin-bottom: 5px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
}

input {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid #e0e5ff;
    border-radius: 10px;
    font-size: 14px;
    background: #f9faff;
    transition: all 0.25s ease;
    color: #111;
}

input:focus {
    outline: none;
    border-color: #6366f1;
    background: white;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.2px;
    transition: all 0.25s ease;
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.22);
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.95;
}

/* Links */
.switch {
    margin-top: 16px;
    text-align: center;
    font-size: 13.5px;
    color: #6b7280;
}

.switch a {
    color: #4f46e5;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    margin-left: 4px;
}

.switch a:hover {
    text-decoration: underline;
}

/* Forgot Password */
.forgot-password {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
    margin-bottom: 12px;
}

.forgot-password a {
    color: #6366f1;
    font-size: 12.5px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
}

.forgot-password a:hover {
    text-decoration: underline;
}

/* Hidden Name */
#nameGroup {
    display: none;
}

/* Modal styles */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(4px);
}

.modal-content {
    background: white;
    margin: 18% auto;
    padding: 30px;
    border-radius: 18px;
    max-width: 400px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
}

.close {
    position: absolute;
    right: 18px;
    top: 12px;
    font-size: 22px;
    cursor: pointer;
    color: #aaa;
    transition: 0.2s;
}

.close:hover {
    color: #111;
}

.modal h3 {
    margin-bottom: 10px;
    color: #111827;
    font-size: 16px;
}

.modal p {
    margin-bottom: 16px;
    font-size: 13.5px;
    color: #6b7280;
}

.modal .input-group label {
    display: none;
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 20px;
    }

    .card {
        padding: 24px 20px 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <span class="logo-text">Accounts</span>
    </div>

    <div class="card">
        <h2 id="title">Welcome back</h2>

        <form id="authForm">

            <div id="nameGroup" class="input-group">
                <label for="fullname">Full name</label>
                <input type="text" id="fullname" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="forgot-password">
                <a onclick="openForgotModal()">Forgot password?</a>
            </div>

            <button type="submit" id="submitBtn">Continue</button>

            <div class="switch">
                <span id="switchText">Don't have an account?</span>
                <a id="toggleMode">Sign up</a>
            </div>

        </form>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeForgotModal()">&times;</span>

        <h3>Reset your password</h3>

        <p>Enter your email to receive reset instructions.</p>

        <div class="input-group">
            <label>Email address</label>
            <input
                type="email"
                id="resetEmail"
                placeholder="you@example.com"
            >
        </div>

        <button onclick="sendResetLink()">
            Send Reset Link
        </button>
    </div>
</div>

<script>
const form = document.getElementById('authForm');
const toggleMode = document.getElementById('toggleMode');
const title = document.getElementById('title');
const nameGroup = document.getElementById('nameGroup');
const switchText = document.getElementById('switchText');
const submitBtn = document.getElementById('submitBtn');

let isLogin = true;

function openForgotModal() {
    document.getElementById('forgotModal').style.display = 'block';
}

function closeForgotModal() {
    document.getElementById('forgotModal').style.display = 'none';
    document.getElementById('resetEmail').value = '';
}

async function sendResetLink() {
    const email = document.getElementById('resetEmail').value;

    if (!email) {
        alert('Please enter your email address');
        return;
    }

    try {
        const response = await fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const data = await response.json();
        alert(data.message);
        closeForgotModal();

    } catch (err) {
        alert('Server error. Please try again.');
    }
}

window.onclick = function(event) {
    const modal = document.getElementById('forgotModal');
    if (event.target === modal) {
        closeForgotModal();
    }
}

toggleMode.addEventListener('click', () => {
    isLogin = !isLogin;

    if (isLogin) {
        title.textContent = "Welcome back";
        nameGroup.style.display = "none";
        switchText.textContent = "Don't have an account?";
        toggleMode.textContent = "Sign up";
    } else {
        title.textContent = "Create an account";
        nameGroup.style.display = "block";
        switchText.textContent = "Already have an account?";
        toggleMode.textContent = "Log in";
    }
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const endpoint = isLogin ? '/login' : '/signup';

    const payload = isLogin
        ? { email: email.value, password: password.value }
        : { fullname: fullname.value, email: email.value, password: password.value };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Processing...';

    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {
            alert(data.message);

            if (!isLogin) {
                setTimeout(() => {
                    isLogin = true;
                    title.textContent = "Welcome back";
                    nameGroup.style.display = "none";
                    switchText.textContent = "Don't have an account?";
                    toggleMode.textContent = "Sign up";
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    alert("Account created! Please login");
                }, 1000);
            } else {
                window.location.href = '/dashboard';
            }

        } else {
            alert(data.message);
        }

    } catch (err) {
        alert("Server not running");
        console.error(err);

    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isLogin ? 'Continue' : 'Sign Up';
    }
});
</script>

</body>
</html>
