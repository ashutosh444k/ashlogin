<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Auth</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

/* ⚪ Pure White Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
}

/* 📄 Form Container */
.container {
    width: 320px;
    padding: 25px;
    border: 1px solid #e0e0e0;
}

/* Heading */
h2 {
    text-align: center;
    font-weight: normal;
    margin-bottom: 20px;
    color: #333;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    background: #f5f5f5; /* grey highlight */
    outline: none;
    font-size: 14px;
}

/* Focus effect */
input:focus {
    background: #eeeeee;
    border-color: #bbb;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #444;
    color: #fff;
    cursor: pointer;
}

/* Links */
.small {
    font-size: 12px;
    color: #777;
    text-align: right;
    margin-bottom: 10px;
}

.small span {
    cursor: pointer;
}

/* Bottom Switch */
.center {
    text-align: center;
    font-size: 13px;
    margin-top: 12px;
    color: #555;
}

.center span {
    cursor: pointer;
}

/* Hidden */
#nameField, #forgotBox {
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="title">Login</h2>

    <form id="form">

        <input type="text" id="fullname" placeholder="Full Name" style="display:none;" />

        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />

        <div class="small" id="forgotLink">
            <span onclick="showForgot()">Forgot?</span>
        </div>

        <div id="forgotBox">
            <input type="email" id="forgotEmail" placeholder="Enter email" />
            <button type="button" onclick="resetPassword()">Reset</button>
        </div>

        <button type="submit" id="btn">Login</button>
    </form>

    <div class="center" id="switchText">
        <span onclick="toggleMode()">Create account</span>
    </div>
</div>

<script>
let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;

    document.getElementById("fullname").style.display = isLogin ? "none" : "block";
    document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById("btn").innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById("forgotLink").style.display = isLogin ? "block" : "none";

    document.getElementById("switchText").innerHTML = isLogin 
        ? `<span onclick="toggleMode()">Create account</span>`
        : `<span onclick="toggleMode()">Login</span>`;
}

function showForgot() {
    document.getElementById("forgotBox").style.display = "block";
}

function resetPassword() {
    const email = document.getElementById("forgotEmail").value;
    if (!email) {
        alert("Enter email");
        return;
    }
    alert("Reset link sent to " + email);
}

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const fullname = document.getElementById("fullname").value;

    const url = isLogin 
        ? "http://127.0.0.1:5000/login" 
        : "http://127.0.0.1:5000/signup";

    const payload = isLogin 
        ? { email, password }
        : { fullname, email, password };

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        alert(data.message);
    } catch {
        alert("Backend not running");
    }
});
</script>

</body>
</html>
